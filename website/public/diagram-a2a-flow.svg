<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="a-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="a-blue-rev" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M9,0 L9,9 L0,4.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="a-slate" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 z" fill="#64748b"/>
    </marker>
    <marker id="a-slate-rev" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M9,0 L9,9 L0,4.5 z" fill="#64748b"/>
    </marker>
    <marker id="a-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 z" fill="#16a34a"/>
    </marker>
    <marker id="a-green-rev" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M9,0 L9,9 L0,4.5 z" fill="#16a34a"/>
    </marker>
    <marker id="a-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 z" fill="#7c3aed"/>
    </marker>
    <marker id="a-purple-rev" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M9,0 L9,9 L0,4.5 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ── Column headers ── -->
  <rect x="30"  y="12" width="140" height="46" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="100" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Client</text>
  <text x="100" y="50" text-anchor="middle" font-size="11" fill="#64748b">Mq9A2AClient</text>

  <rect x="350" y="12" width="160" height="46" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="430" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">mq9 Broker</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#3b82f6">registry + mailbox</text>

  <rect x="690" y="12" width="140" height="46" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="760" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Agent</text>
  <text x="760" y="50" text-anchor="middle" font-size="11" fill="#16a34a">Mq9A2AAgent</text>

  <!-- ── Lifelines ── -->
  <line x1="100" y1="58" x2="100" y2="490" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="430" y1="58" x2="430" y2="490" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="760" y1="58" x2="760" y2="490" stroke="#86efac" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ══════════════════════════════════════════════════════════
       PHASE 1 — Agent startup (right side, green)
       ══════════════════════════════════════════════════════════ -->

  <!-- Phase label -->
  <rect x="648" y="76" width="164" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="730" y="91" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">① Agent startup</text>

  <!-- Agent → Broker: MAILBOX.CREATE -->
  <line x1="758" y1="112" x2="432" y2="112" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a-green-rev)"/>
  <rect x="500" y="98" width="190" height="20" rx="4" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="595" y="112" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">MAILBOX.CREATE(name)</text>

  <!-- Broker → Agent: mailbox address -->
  <line x1="432" y1="136" x2="758" y2="136" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-slate)"/>
  <rect x="500" y="122" width="190" height="20" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="595" y="136" text-anchor="middle" font-size="11" fill="#475569">→ mail_address</text>

  <!-- Agent → Broker: AGENT.REGISTER -->
  <line x1="758" y1="163" x2="432" y2="163" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a-green-rev)"/>
  <rect x="488" y="149" width="218" height="20" rx="4" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="597" y="163" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">AGENT.REGISTER(AgentCard)</text>

  <!-- ══════════════════════════════════════════════════════════
       PHASE 2 — Client discover
       ══════════════════════════════════════════════════════════ -->

  <rect x="28"  y="192" width="164" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="110" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">② Client discover</text>

  <!-- Client → Broker: AGENT.DISCOVER -->
  <line x1="102" y1="230" x2="428" y2="230" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="155" y="216" width="218" height="20" rx="4" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="264" y="230" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">AGENT.DISCOVER(semantic)</text>

  <!-- Broker → Client: agents list -->
  <line x1="428" y1="254" x2="102" y2="254" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-slate-rev)"/>
  <rect x="155" y="240" width="218" height="20" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="264" y="254" text-anchor="middle" font-size="11" fill="#475569">→ [{name, mailbox, AgentCard}]</text>

  <!-- ══════════════════════════════════════════════════════════
       PHASE 3 — Send task
       ══════════════════════════════════════════════════════════ -->

  <rect x="28"  y="280" width="164" height="22" rx="4" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="110" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">③ Send task</text>

  <!-- Client → Broker: MSG.SEND (with reply_to) -->
  <line x1="102" y1="320" x2="428" y2="320" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#a-purple)"/>
  <rect x="100" y="306" width="280" height="20" rx="4" fill="white" stroke="#ddd6fe" stroke-width="1"/>
  <text x="240" y="320" text-anchor="middle" font-size="11" fill="#6d28d9" font-weight="600">MSG.SEND.{mailbox}  +  mq9-reply-to: cb</text>

  <!-- Broker → Agent: deliver message -->
  <line x1="432" y1="344" x2="758" y2="344" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#a-purple)"/>
  <rect x="514" y="330" width="186" height="20" rx="4" fill="white" stroke="#ddd6fe" stroke-width="1"/>
  <text x="607" y="344" text-anchor="middle" font-size="11" fill="#6d28d9" font-weight="600">deliver SendMessageRequest</text>

  <!-- ══════════════════════════════════════════════════════════
       PHASE 4 — Stream events back
       ══════════════════════════════════════════════════════════ -->

  <rect x="648" y="368" width="164" height="22" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="730" y="383" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">④ Stream events</text>

  <!-- Agent → Broker: MSG.SEND.{cb} (events) -->
  <line x1="758" y1="408" x2="432" y2="408" stroke="#ea580c" stroke-width="1.8" marker-end="url(#a-green-rev)" stroke="none"/>
  <line x1="758" y1="408" x2="432" y2="408" stroke="#f97316" stroke-width="1.8" marker-end="url(#a-purple-rev)"/>
  <rect x="496" y="394" width="224" height="20" rx="4" fill="white" stroke="#fed7aa" stroke-width="1"/>
  <text x="608" y="408" text-anchor="middle" font-size="11" fill="#c2410c" font-weight="600">MSG.SEND.{cb}  (one per event)</text>

  <!-- Broker → Client: stream events -->
  <line x1="428" y1="432" x2="102" y2="432" stroke="#f97316" stroke-width="1.8" marker-end="url(#a-slate-rev)"/>
  <rect x="100" y="418" width="286" height="20" rx="4" fill="white" stroke="#fed7aa" stroke-width="1"/>
  <text x="243" y="432" text-anchor="middle" font-size="11" fill="#c2410c" font-weight="600">Task → working → artifact → completed</text>

  <!-- last marker label -->
  <rect x="252" y="446" width="222" height="20" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="363" y="460" text-anchor="middle" font-size="11" fill="#9a3412">last event carries  mq9-a2a-last: true</text>
</svg>
