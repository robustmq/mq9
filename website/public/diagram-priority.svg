<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230" width="820" height="230" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr-p" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ── Left panel: Mailbox queue ── -->
  <rect x="20" y="20" width="560" height="192" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="42" y="46" font-size="12" fill="#94a3b8" font-weight="500">Mailbox — incoming messages</text>

  <!-- Critical row -->
  <rect x="40" y="58" width="520" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="40" y="58" width="100" height="40" rx="6" fill="#ef4444"/>
  <text x="90" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="white">critical</text>
  <text x="200" y="76" font-size="12" fill="#dc2626" font-weight="600">msg #3</text>
  <text x="200" y="92" font-size="11" fill="#f87171">abort signal</text>
  <text x="340" y="76" font-size="12" fill="#dc2626" font-weight="600">msg #7</text>
  <text x="340" y="92" font-size="11" fill="#f87171">emergency stop</text>

  <!-- Urgent row -->
  <rect x="40" y="110" width="520" height="40" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <rect x="40" y="110" width="100" height="40" rx="6" fill="#f97316"/>
  <text x="90" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="white">urgent</text>
  <text x="200" y="128" font-size="12" fill="#ea580c" font-weight="600">msg #1</text>
  <text x="200" y="144" font-size="11" fill="#fb923c">approval needed</text>
  <text x="340" y="128" font-size="12" fill="#ea580c" font-weight="600">msg #5</text>
  <text x="340" y="144" font-size="11" fill="#fb923c">interrupt task</text>

  <!-- Normal row -->
  <rect x="40" y="162" width="520" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="40" y="162" width="100" height="40" rx="6" fill="#22c55e"/>
  <text x="90" y="187" text-anchor="middle" font-size="12" font-weight="700" fill="white">normal</text>
  <text x="200" y="180" font-size="12" fill="#15803d" font-weight="600">msg #2</text>
  <text x="200" y="196" font-size="11" fill="#4ade80">task dispatch</text>
  <text x="340" y="180" font-size="12" fill="#15803d" font-weight="600">msg #4</text>
  <text x="340" y="196" font-size="11" fill="#4ade80">result delivery</text>
  <text x="470" y="180" font-size="12" fill="#15803d" font-weight="600">msg #6</text>
  <text x="470" y="196" font-size="11" fill="#4ade80">task dispatch</text>

  <!-- ── Arrow: FETCH ── -->
  <line x1="584" y1="116" x2="628" y2="116" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="606" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">FETCH</text>

  <!-- ── Right panel: FETCH output order ── -->
  <rect x="636" y="20" width="164" height="192" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="718" y="46" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="500">returned order</text>

  <rect x="652" y="56" width="132" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="668" y="70" font-size="11" fill="#dc2626" font-weight="700">1.</text>
  <text x="686" y="70" font-size="11" fill="#dc2626" font-weight="600">msg #3</text>
  <text x="686" y="85" font-size="10" fill="#f87171">critical</text>

  <rect x="652" y="100" width="132" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="668" y="114" font-size="11" fill="#dc2626" font-weight="700">2.</text>
  <text x="686" y="114" font-size="11" fill="#dc2626" font-weight="600">msg #7</text>
  <text x="686" y="129" font-size="10" fill="#f87171">critical</text>

  <rect x="652" y="144" width="132" height="36" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="668" y="158" font-size="11" fill="#ea580c" font-weight="700">3.</text>
  <text x="686" y="158" font-size="11" fill="#ea580c" font-weight="600">msg #1</text>
  <text x="686" y="173" font-size="10" fill="#fb923c">urgent</text>

  <text x="718" y="206" text-anchor="middle" font-size="10" fill="#94a3b8">normal follows…</text>
</svg>
